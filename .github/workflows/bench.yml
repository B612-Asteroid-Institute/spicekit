name: bench + parity

on:
  push:
    branches: [main]
    # Skip when the workflow itself just committed BENCHMARKS.md, so we
    # don't loop. The commit-back step below writes ONLY this file.
    paths-ignore:
      - "BENCHMARKS.md"
  pull_request:
  workflow_dispatch:

permissions:
  # Needed for the commit-back-to-main and PR-comment steps below.
  contents: write
  pull-requests: write

jobs:
  spicekit-vs-cspice:
    # Ubuntu only: cspice-sys's `downloadcspice` feature misdetects the
    # target on Apple Silicon and fails to build; the bench skeleton
    # compiles cleanly on every platform with `--no-default-features`,
    # but the side-by-side comparison is meaningful only where CSpice
    # itself builds.
    runs-on: ubuntu-latest

    # Override rust-toolchain.toml (pinned at MSRV 1.85 for the core crate):
    # cspice-sys's transitive deps require 1.88+. spicekit-bench is
    # unpublished (publish = false) so it can float to stable.
    env:
      RUSTUP_TOOLCHAIN: stable

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .

      - name: Install Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install NAIF kernel packages
        # Each `naif-*` package vendors a single kernel and exports a
        # single absolute-path string; we resolve them via env vars in
        # the next step so tests don't spawn a Python subprocess per
        # kernel.
        run: |
          uv pip install --system \
            naif-leapseconds \
            naif-de440 \
            naif-eop-predict \
            naif-eop-historical \
            naif-eop-high-prec \
            naif-earth-itrf93

      - name: Resolve kernel paths
        id: kernels
        run: |
          python - <<'PY' >> "$GITHUB_ENV"
          from naif_leapseconds import leapseconds
          from naif_de440 import de440
          from naif_eop_predict import eop_predict
          from naif_eop_historical import eop_historical
          from naif_eop_high_prec import eop_high_prec
          from naif_earth_itrf93 import earth_itrf93
          print(f"SPICEKIT_BENCH_KERNEL_LEAPSECONDS={leapseconds}")
          print(f"SPICEKIT_BENCH_KERNEL_DE440={de440}")
          print(f"SPICEKIT_BENCH_KERNEL_EOP_PREDICT={eop_predict}")
          print(f"SPICEKIT_BENCH_KERNEL_EOP_HISTORICAL={eop_historical}")
          print(f"SPICEKIT_BENCH_KERNEL_EOP_HIGH_PREC={eop_high_prec}")
          print(f"SPICEKIT_BENCH_KERNEL_EARTH_ITRF93={earth_itrf93}")
          PY

      - name: Build bench crate (with CSpice)
        # First build ensures cspice-sys's `downloadcspice` finishes
        # before any `cargo test` / `cargo run` tries to link.
        run: cargo build --release -p spicekit-bench --features cspice

      - name: Run parity tests (spicekit vs CSpice)
        run: cargo test --release -p spicekit-bench --features cspice

      - name: Run side-by-side benchmark
        run: cargo run --release --bin spicekit-bench --features cspice | tee bench_raw.md

      - name: Render BENCHMARKS.md
        # Wrap the raw table in a header block so the committed file
        # carries provenance (commit SHA, runner, date).
        run: |
          {
            echo "# Benchmark results"
            echo
            echo "spicekit vs CSpice, side-by-side on matched inputs."
            echo
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Runner: \`${RUNNER_OS}\` (\`$(uname -m)\`)"
            echo "- Generated: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            echo "- Source: \`cargo run --release --bin spicekit-bench\`"
            echo
            echo "Speedup = cspice / spicekit (higher is better for spicekit)."
            echo
            cat bench_raw.md
          } > BENCHMARKS.md

      - name: Upload bench results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spicekit-bench-results
          path: BENCHMARKS.md
          if-no-files-found: warn

      - name: Commit BENCHMARKS.md to main
        # Only runs on push-to-main. Uses the default GITHUB_TOKEN, which
        # `permissions: contents: write` above grants. `[skip ci]` plus
        # the `paths-ignore` filter prevent a re-trigger loop.
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add BENCHMARKS.md
          # After staging, check if anything actually changed vs HEAD.
          # `git diff --quiet --cached` catches both edits AND new-file
          # cases; a plain `git diff` misses untracked new files.
          if git diff --quiet --cached -- BENCHMARKS.md; then
            echo "BENCHMARKS.md unchanged — skipping commit."
            exit 0
          fi
          git commit -m "ci: update BENCHMARKS.md [skip ci]"
          git push origin HEAD:main

      - name: Post/update sticky PR comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: spicekit-bench
          path: BENCHMARKS.md
